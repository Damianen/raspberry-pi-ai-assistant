# Raspberry Pi 5 profile (ASSISTANT_PROFILE=pi).
# Target DSI touchscreen is 800x480 — verify the real resolution on device.
display:
  width: 800
  height: 480
  fullscreen: true
camera:
  index: 0                  # the USB webcam is the Pi's only camera
  # Slice 7: pin the USB webcam's /dev/v4l/by-id/... path here once known.
  device: null
  width: 640                # requested capture size (MJPG); actual is logged
  height: 480
  fps: 15
perception:
  detect_every_n_frames: 3      # run YuNet on every Nth captured frame
  detector_score_threshold: 0.8 # YuNet face confidence
  detector_nms_threshold: 0.3
  detector_top_k: 5000
  presence_frames: 3            # consecutive face-frames before person_appeared
  absence_timeout_s: 25.0       # this long without a face -> person_left
  gaze_throttle_ms: 150         # at most one gaze event per this interval
  gaze_mirror: true             # flip x so the eyes track like a mirror
  match_threshold: 0.363        # SFace cosine similarity (opencv zoo default)
  vote_samples: 7               # identity decided by majority of this many samples
  reverify_interval_s: 90.0     # re-run the identity vote this often while present
  show_debug: false             # OpenCV window with detection box + decided name
  enroll_samples: 10            # embeddings averaged by assistant-enroll
  enroll_timeout_s: 30.0
  enroll_min_gap_ms: 300        # spacing between enrollment samples
face:
  transition_ms: 250        # state-to-state ease duration
  breathing_hz: 0.1         # sleeping breathing rate
  bounce_hz: 2.5            # speaking bounce rate
  drift_hz: 0.2             # slow gaze drift rate (thinking)
  debug_controls: false     # no keyboard/mouse debug on the device
  debug_gaze_hz: 20
  blink:
    min_interval_s: 2.0
    max_interval_s: 7.0
    close_open_ms: 120
    double_chance: 0.15
    double_gap_ms: 180
  gaze:
    smoothing: 0.15         # pupil lerp factor per frame (60 fps)
    idle_after_s: 5.0       # idle wander after this long without a gaze target
    drift_amount: 0.02      # wander nudge size, normalized gaze units
    drift_interval_s: 0.8
    glance_min_s: 2.0       # random glance every glance_min..glance_max seconds
    glance_max_s: 6.0
    glance_margin: 0.15     # wander/glance targets stay this far from the edges
# Placeholders — filled in by later slices.
stt: {}
tts: {}
llm: {}
