# Copy to config.toml and fill in. config.toml is gitignored.
# The OpenRouter key is read from the OPENROUTER_API_KEY environment variable,
# NEVER from this file. Do not commit secrets.

[ui]
fullscreen = true
fps = 60

[audio]
input_device = ""     # sounddevice index/name for the USB mic ("" = default)
output_device = ""    # sounddevice index/name for the case speakers
max_record_seconds = 8

[stt]
model = "base.en"

[tts]
voice = "en_US-amy-medium"

[brain]
# Cheap, fast, good at short instruction-following / JSON.
model = "google/gemini-2.5-flash-lite"
fallback_model = "deepseek/deepseek-v4-flash"
timeout_seconds = 7
max_tokens = 300

[storage]
db_path = "assistant.db"
